<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stardust Core OS | Galaxy Edition</title>
    
    <!-- เชื่อมต่อ Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- เชื่อมต่อ SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- เชื่อมต่อ CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- หน้าจอเปิดตัวโลโก้ (Splash Screen) -->
    <div id="splash-screen">
        <!-- เปลี่ยน LogoHG.png เป็นชื่อไฟล์รูปโลโก้ของคุณ -->
        <img src="LogoSC.png" alt="StardustCoreLogo" id="splash-logo">
        <div class="loading-text">INITIALIZING SYSTEM...</div>
    </div>

    <!-- หน้าจอโชว์ IG -->
    <div id="ig-screen">
        <div class="ig-content">
            <!-- เปลี่ยน Instagram_icon.png เป็นชื่อไฟล์รูปไอคอน IG ของคุณ -->
            <img src="Instagram_icon.png" class="ig-icon-img" alt="Instagram">
            <span class="ig-handle">sileiabeans</span>
        </div>
    </div>

    <!-- เอฟเฟกต์ดาวระยิบระยับพื้นหลัง -->
    <div class="starfield"></div>

    <main class="container" id="main-content" style="display: none; opacity: 0; transform: translateY(20px); transition: all 1s ease-in-out;">        <!-- ส่วนหัว (Hero) -->
        <header class="hero">
            <div class="status-badge">System Online</div>
            <h1>Stardust Core</h1>
            <p class="subtitle">บันทึกพิกัดและประเมินสถานะการสำรวจเนบิวลา</p>
        </header>

        <form id="assessmentForm">
            <!-- ส่วนที่ 1: ข้อมูลนักบิน -->
            <section class="form-section">
                <div class="section-label">01 / PERSONNEL IDENTITY</div>
                
                <div class="input-group">
                    <label for="pilot-name">นามเรียกขาน (Name)</label>
                    <input type="text" id="pilot-name" name="name" placeholder="ENTER PILOT NAME..." required>
                </div>

                <div class="input-group">
                    <label>ระดับชั้นอายุ (Age)</label>
                    <div class="custom-select">
                        <input type="radio" id="rank1" name="rank" value="ต่ำกว่า 19 ปี" required>
                        <label for="rank1" class="select-box">ต่ำกว่า 19 ปี</label>
                        
                        <input type="radio" id="rank2" name="rank" value="19-23 ปี">
                        <label for="rank2" class="select-box">19-23 ปี</label>
                        
                        <input type="radio" id="rank3" name="rank" value="23">
                        <label for="rank3" class="select-box">23 ปีขึ้นไป</label>
                    </div>
                </div>
            </section>

            <!-- ส่วนที่ 2: การประเมินภารกิจ -->
            <section class="form-section">
                <div class="section-label">02 / MISSION FEEDBACK</div>

                <div class="input-group">
                    <label>ความเสถียรของระบบวาร์ป (Warp Drive Stability)</label>
                    <div class="star-rating">
                        <input type="radio" id="r5" name="rate" value="5" required>
                        <label for="r5" class="rating-label">5</label>
                        
                        <input type="radio" id="r4" name="rate" value="4">
                        <label for="r4" class="rating-label">4</label>
                        
                        <input type="radio" id="r3" name="rate" value="3">
                        <label for="r3" class="rating-label">3</label>
                        
                        <input type="radio" id="r2" name="rate" value="2">
                        <label for="r2" class="rating-label">2</label>
                        
                        <input type="radio" id="r1" name="rate" value="1">
                        <label for="r1" class="rating-label">1</label>
                    </div>
                </div>

                <div class="input-group">
                    <label for="message">ข้อความถึงศูนย์ควบคุม (Logs)</label>
                    <textarea id="message" name="feedback" rows="4" placeholder="TRANSMIT YOUR MESSAGE HERE..."></textarea>
                </div>
            </section>


            <!-- ส่วนที่ 3: เลือกตัวละคร (Entity Encounter) -->
            <section class="form-section">
                <div class="section-label">03 / ENTITY ENCOUNTER</div>

                <div class="input-group">
                    <label>ระบุสิ่งมีชีวิต/ตัวละครที่คุณประทับใจมากที่สุดในภารกิจนี้</label>
                    
                    <div class="character-grid">
                        <!-- ตัวละครที่ 1 -->
                        <label class="character-card">
                            <input type="radio" name="fav_character" value="Character 1" required>
                            <!-- อย่าลืมเปลี่ยน src เป็นชื่อไฟล์รูปของคุณ เช่น char1.png -->
                            <img src="Asteroisuar.png" alt="Char 1">
                            <span class="char-name">ASTEROISUAR</span>
                        </label>

                        <!-- ตัวละครที่ 2 -->
                        <label class="character-card">
                            <input type="radio" name="fav_character" value="Character 2">
                            <img src="Yang.png" alt="Char 2">
                            <span class="char-name">YANGWEIMING</span>
                        </label>

                        <!-- ตัวละครที่ 3 -->
                        <label class="character-card">
                            <input type="radio" name="fav_character" value="Character 3">
                            <img src="Korsdaver.png" alt="Char 3">
                            <span class="char-name">KORS DAVER 03</span>
                        </label>

                        <!-- ตัวละครที่ 4 -->
                        <label class="character-card">
                            <input type="radio" name="fav_character" value="Character 4">
                            <img src="Jaxx.png" alt="Char 4">
                            <span class="char-name">JAXX 04</span>
                        </label>

                        <!-- ตัวละครที่ 5 -->
                        <label class="character-card">
                            <input type="radio" name="fav_character" value="Character 5">
                            <img src="Chariot.png" alt="Char 5">
                            <span class="char-name">CHARIOT</span>
                        </label>

                        <!-- ตัวละครที่ 6 -->
                        <label class="character-card">
                            <input type="radio" name="fav_character" value="Character 6">
                            <img src="Ego.png" alt="Char 6">
                            <span class="char-name">E.G.O</span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- ปุ่มส่งข้อมูล -->
            <button type="submit" id="submitBtn">INITIATE LAUNCH</button>
        </form>

        <!-- ส่วนท้าย -->
        <footer class="main-footer">
            <p>©2026 ART TOYS PROJECT | GALAXY EDITION</p>
            <div class="social-links">
                <a href="https://www.instagram.com/sileiabeans/">INSTAGRAM</a>
                <a href="#">GITHUB</a>
            </div>
        </footer>
    </main>

    <!-- เชื่อมต่อ JavaScript -->
    <script src="script.js"></script>
</body>
</html>
