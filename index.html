<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HorrorGram - แบบประเมินประสิทธิภาพสมบูรณ์</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- เชื่อมต่อกับไฟล์ CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- 1. หน้าจอโลโก้ HorrorGram -->
    <div id="splash-screen"><img src="LogoHG.png" id="logo-img" alt="Logo"></div>

    <!-- 2. หน้าจอ Credit IG -->
    <div id="ig-screen">
        <div class="ig-content">
            <img src="Instagram_icon.png" class="ig-icon-img" alt="Instagram">
            <span class="ig-handle">sileiabeans</span>
        </div>
    </div>

    <!-- 3. หน้าจอแบบประเมินหลัก (Container) -->
    <div class="container">
        <img src="Banner.png" class="header-img" alt="Banner">
        
        <div class="survivor-header">
            <h1 class="survivor-title flicker-text">บันทึกผู้รอดชีวิต</h1>
            <p class="survivor-subtext">โปรดทิ้งร่องรอยของคุณไว้ด้านล่าง</p>
        </div>

        <form id="assessmentForm">
            <div class="section">
                <h2>ข้อมูลส่วนบุคคล</h2>
                <div class="question-box">
                    <label class="main-q">นามของผู้รอดชีวิต</label>
                    <input type="text" name="name" placeholder="ระบุนามของคุณ..." required>
                </div>
                <div class="question-box">
                    <label class="main-q">อายุ</label>
                    <input type="radio" id="age1" name="age" value="ต่ำกว่า 19 ปี" required>
                    <label for="age1" class="age-label">ต่ำกว่า 19 ปี</label>
                    
                    <input type="radio" id="age2" name="age" value="19-23 ปี">
                    <label for="age2" class="age-label">19-23 ปี</label>
                    
                    <input type="radio" id="age3" name="age" value="24 ปีขึ้นไป">
                    <label for="age3" class="age-label">24 ปีขึ้นไป</label>
                </div>
            </div>

            <!-- เริ่มส่วนคำถามที่เรียง 5 4 3 2 1 -->
            <div class="section">
                <h2>1. User Interface - UI</h2>
                <div class="question-box">
                    <label class="main-q">ความสวยงามและรายละเอียดของตัวละครผี</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ui1_5" name="ui_1" value="5" required><label for="ui1_5" class="rating-label">5</label>
                        <input type="radio" id="ui1_4" name="ui_1" value="4"><label for="ui1_4" class="rating-label">4</label>
                        <input type="radio" id="ui1_3" name="ui_1" value="3"><label for="ui1_3" class="rating-label">3</label>
                        <input type="radio" id="ui1_2" name="ui_1" value="2"><label for="ui1_2" class="rating-label">2</label>
                        <input type="radio" id="ui1_1" name="ui_1" value="1"><label for="ui1_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">การตกแต่งบรรยากาศบูธมีความสอดคล้องกัน</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ui2_5" name="ui_2" value="5" required><label for="ui2_5" class="rating-label">5</label>
                        <input type="radio" id="ui2_4" name="ui_2" value="4"><label for="ui2_4" class="rating-label">4</label>
                        <input type="radio" id="ui2_3" name="ui_2" value="3"><label for="ui2_3" class="rating-label">3</label>
                        <input type="radio" id="ui2_2" name="ui_2" value="2"><label for="ui2_2" class="rating-label">2</label>
                        <input type="radio" id="ui2_1" name="ui_2" value="1"><label for="ui2_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">ความชัดเจนและการจัดวางองค์ประกอบบนบอร์ด</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ui3_5" name="ui_3" value="5" required><label for="ui3_5" class="rating-label">5</label>
                        <input type="radio" id="ui3_4" name="ui_3" value="4"><label for="ui3_4" class="rating-label">4</label>
                        <input type="radio" id="ui3_3" name="ui_3" value="3"><label for="ui3_3" class="rating-label">3</label>
                        <input type="radio" id="ui3_2" name="ui_3" value="2"><label for="ui3_2" class="rating-label">2</label>
                        <input type="radio" id="ui3_1" name="ui_3" value="1"><label for="ui3_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">การจัดวางพื้นที่ใช้งาน (Spatial Design)</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ui4_5" name="ui_4" value="5" required><label for="ui4_5" class="rating-label">5</label>
                        <input type="radio" id="ui4_4" name="ui_4" value="4"><label for="ui4_4" class="rating-label">4</label>
                        <input type="radio" id="ui4_3" name="ui_4" value="3"><label for="ui4_3" class="rating-label">3</label>
                        <input type="radio" id="ui4_2" name="ui_4" value="2"><label for="ui4_2" class="rating-label">2</label>
                        <input type="radio" id="ui4_1" name="ui_4" value="1"><label for="ui4_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">ความสร้างสรรค์ในการออกแบบ (Creativity)</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ui5_5" name="ui_5" value="5" required><label for="ui5_5" class="rating-label">5</label>
                        <input type="radio" id="ui5_4" name="ui_5" value="4"><label for="ui5_4" class="rating-label">4</label>
                        <input type="radio" id="ui5_3" name="ui_5" value="3"><label for="ui5_3" class="rating-label">3</label>
                        <input type="radio" id="ui5_2" name="ui_5" value="2"><label for="ui5_2" class="rating-label">2</label>
                        <input type="radio" id="ui5_1" name="ui_5" value="1"><label for="ui5_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">คุณภาพของสื่อแสดงผล (Visual Quality)</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ui6_5" name="ui_6" value="5" required><label for="ui6_5" class="rating-label">5</label>
                        <input type="radio" id="ui6_4" name="ui_6" value="4"><label for="ui6_4" class="rating-label">4</label>
                        <input type="radio" id="ui6_3" name="ui_6" value="3"><label for="ui6_3" class="rating-label">3</label>
                        <input type="radio" id="ui6_2" name="ui_6" value="2"><label for="ui6_2" class="rating-label">2</label>
                        <input type="radio" id="ui6_1" name="ui_6" value="1"><label for="ui6_1" class="rating-label">1</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>2. User Experience - UX</h2>
                <div class="question-box">
                    <label class="main-q">ความแม่นยำในการตรวจจับของเซนเซอร์</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ux1_5" name="ux_1" value="5" required><label for="ux1_5" class="rating-label">5</label>
                        <input type="radio" id="ux1_4" name="ux_1" value="4"><label for="ux1_4" class="rating-label">4</label>
                        <input type="radio" id="ux1_3" name="ux_1" value="3"><label for="ux1_3" class="rating-label">3</label>
                        <input type="radio" id="ux1_2" name="ux_1" value="2"><label for="ux1_2" class="rating-label">2</label>
                        <input type="radio" id="ux1_1" name="ux_1" value="1"><label for="ux1_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">จังหวะการแสดงผล Jumpscare</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ux2_5" name="ux_2" value="5" required><label for="ux2_5" class="rating-label">5</label>
                        <input type="radio" id="ux2_4" name="ux_2" value="4"><label for="ux2_4" class="rating-label">4</label>
                        <input type="radio" id="ux2_3" name="ux_2" value="3"><label for="ux2_3" class="rating-label">3</label>
                        <input type="radio" id="ux2_2" name="ux_2" value="2"><label for="ux2_2" class="rating-label">2</label>
                        <input type="radio" id="ux2_1" name="ux_2" value="1"><label for="ux2_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">ลำดับขั้นตอนมีความลื่นไหลเข้าใจง่าย</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="ux3_5" name="ux_3" value="5" required><label for="ux3_5" class="rating-label">5</label>
                        <input type="radio" id="ux3_4" name="ux_3" value="4"><label for="ux3_4" class="rating-label">4</label>
                        <input type="radio" id="ux3_3" name="ux_3" value="3"><label for="ux3_3" class="rating-label">3</label>
                        <input type="radio" id="ux3_2" name="ux_3" value="2"><label for="ux3_2" class="rating-label">2</label>
                        <input type="radio" id="ux3_1" name="ux_3" value="1"><label for="ux3_1" class="rating-label">1</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>3. ด้านเทคโนโลยีและงานออกแบบ</h2>
                <div class="question-box">
                    <label class="main-q">ความสวยงามและรายละเอียดตัวละคร</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="d1_5" name="design_1" value="5" required><label for="d1_5" class="rating-label">5</label>
                        <input type="radio" id="d1_4" name="design_1" value="4"><label for="d1_4" class="rating-label">4</label>
                        <input type="radio" id="d1_3" name="design_1" value="3"><label for="d1_3" class="rating-label">3</label>
                        <input type="radio" id="d1_2" name="design_1" value="2"><label for="d1_2" class="rating-label">2</label>
                        <input type="radio" id="d1_1" name="design_1" value="1"><label for="d1_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">คุณภาพของสื่อแสดงผล (Visual Quality)</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="d2_5" name="design_3" value="5" required><label for="d2_5" class="rating-label">5</label>
                        <input type="radio" id="d2_4" name="design_3" value="4"><label for="d2_4" class="rating-label">4</label>
                        <input type="radio" id="d2_3" name="design_3" value="3"><label for="d2_3" class="rating-label">3</label>
                        <input type="radio" id="d2_2" name="design_3" value="2"><label for="d2_2" class="rating-label">2</label>
                        <input type="radio" id="d2_1" name="design_3" value="1"><label for="d2_1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">การตกแต่งบรรยากาศภายในห้อง</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="d3_5" name="design_2" value="5" required><label for="d3_5" class="rating-label">5</label>
                        <input type="radio" id="d3_4" name="design_2" value="4"><label for="d3_4" class="rating-label">4</label>
                        <input type="radio" id="d3_3" name="design_2" value="3"><label for="d3_3" class="rating-label">3</label>
                        <input type="radio" id="d3_2" name="design_2" value="2"><label for="d3_2" class="rating-label">2</label>
                        <input type="radio" id="d3_1" name="design_2" value="1"><label for="d3_1" class="rating-label">1</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>4. ความพึงพอใจโดยรวม</h2>
                <div class="question-box">
                    <label class="main-q">ความสมจริงของ Hologram</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="h5" name="hologram_score" value="5" required><label for="h5" class="rating-label">5</label>
                        <input type="radio" id="h4" name="hologram_score" value="4"><label for="h4" class="rating-label">4</label>
                        <input type="radio" id="h3" name="hologram_score" value="3"><label for="h3" class="rating-label">3</label>
                        <input type="radio" id="h2" name="hologram_score" value="2"><label for="h2" class="rating-label">2</label>
                        <input type="radio" id="h1" name="hologram_score" value="1"><label for="h1" class="rating-label">1</label>
                    </div>
                </div>
                <div class="question-box">
                    <label class="main-q">ความพึงพอใจในคุณภาพเสียง</label>
                    <div style="display:flex; gap:12px; justify-content: center;">
                        <input type="radio" id="s5" name="sound_score" value="5" required><label for="s5" class="rating-label">5</label>
                        <input type="radio" id="s4" name="sound_score" value="4"><label for="s4" class="rating-label">4</label>
                        <input type="radio" id="s3" name="sound_score" value="3"><label for="s3" class="rating-label">3</label>
                        <input type="radio" id="s2" name="sound_score" value="2"><label for="s2" class="rating-label">2</label>
                        <input type="radio" id="s1" name="sound_score" value="1"><label for="s1" class="rating-label">1</label>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>5. วิญญาณที่ประทับใจ (เลือกได้หลายตัว)</h2>
                <div class="ghost-grid">
                    <label class="ghost-card"><input type="checkbox" name="fav_ghost" value="G1"><img src="G1.png"><span>ผี 1</span></label>
                    <label class="ghost-card"><input type="checkbox" name="fav_ghost" value="G2"><img src="G2.png"><span>ผี 2</span></label>
                    <label class="ghost-card"><input type="checkbox" name="fav_ghost" value="G3"><img src="G3.png"><span>ผี 3</span></label>
                    <label class="ghost-card"><input type="checkbox" name="fav_ghost" value="G4"><img src="G4.png"><span>ผี 4</span></label>
                    <label class="ghost-card"><input type="checkbox" name="fav_ghost" value="G5"><img src="G5.png"><span>ผี 5</span></label>
                    <label class="ghost-card"><input type="checkbox" name="fav_ghost" value="G6"><img src="G6.png"><span>ผี 6</span></label>
                    <label class="ghost-card"><input type="checkbox" name="fav_ghost" value="G7"><img src="G7.png"><span>ผี 7</span></label>
                </div>
            </div>

            <div style="padding: 25px;"><button type="submit" id="submitBtn">ยืนยันการส่งข้อมูล</button></div>
        </form>

        <div class="footer-contact">
            <p class="contact-text">หากวิญญาณมีข้อสงสัย... ติดต่อผู้สร้างอาณาจักรความหลอน</p>
            <a href="https://www.instagram.com/sileiabeans/" target="_blank" class="contact-link">
                <!-- 🔴 บังคับขนาดไอจีไม่ให้ขยายร่างทะลุจอ -->
                <img src="Instagram_icon.png" alt="Instagram" style="width: 25px; height: 25px; min-width: 25px; object-fit: contain;">
                <span>@sileiabeans</span>
            </a>
        </div>
    </div>

    <!-- เชื่อมต่อกับไฟล์ JavaScript -->
    <script src="script.js"></script>
</body>
</html>
